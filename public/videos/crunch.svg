<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/><stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.3">
        <animate attributeName="stop-opacity" values="0.3;0.08;0.3" dur="1.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="280" fill="url(#bg)"/>
  <circle cx="200" cy="130" r="90" fill="url(#pulse)"/>
  <circle cx="200" cy="130" r="65" fill="none" stroke="#EC4899" stroke-width="1.5" stroke-opacity="0.25">
    <animate attributeName="r" values="65;70;65" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.25;0.5;0.25" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="148" font-size="56" text-anchor="middle" dominant-baseline="middle">
    🎯
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="1.2s" repeatCount="indefinite"/>
  </text>
  <text x="200" y="210" font-size="18" font-weight="800" text-anchor="middle" fill="#EC4899" font-family="system-ui,sans-serif" letter-spacing="2">CRUNCH</text>
  <text x="200" y="232" font-size="11" text-anchor="middle" fill="#444" font-family="system-ui,sans-serif">VIDEO DEMO</text>
  <rect x="0" y="0" width="400" height="2.5" fill="#EC4899" opacity="0.8"/>
  <!-- Animated scanline -->
  <rect x="0" y="0" width="400" height="2" fill="#EC4899" opacity="0.15">
    <animate attributeName="y" values="0;280;0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>